schema_version: '3'
tiers:
  elementwise:
    level: 0
    description: 'Template-substitution kernels: load -> single op -> store'
    note: One unary + one binary representative covers the pattern
  reduction:
    level: 1
    description: Output shape differs from input; accumulation logic
  composed:
    level: 2
    description: No single asc2 builtin; agent must compose multiple API calls
  advanced:
    level: 3
    description: Multi-dimensional tiling, accumulator management, placement
operations:
- name: abs
  tier: elementwise
  asc2_api: asc2.abs(x)
  representative_of:
  - exp
  - log
  - sqrt
  - relu
  - erf
  - sin
  - cos
  - neg
  - ceil
  - floor
  - rsqrt
  coverage_note: relu covered by representative_of from abs; see docs/glossary.md §7. tanh is now a first-class cell (perf-gated), no longer a representative.
  cells:
  - dtype: float16
    platform: Ascend950PR_9599
    shape_regime: fixed
    reduce_axis: null
    output_shape: same_as_input
    accumulator_dtype: null
    identity: null
    tail_behavior: aligned_only
    padding: null
    partitioning: tile_per_core
    unsupported_regimes: []
    examples_policy:
      task_prompt: true
      glossary: true
      golden_kernels: false
      golden_docs: false
      external_web: false
      human_hints: false
    prompt: Help me develop an abs operator (out = |x|) on Ascend950PR_9599 (C310) for float16 with shapes [1,128], [4,2048], [32,4096].
    prompt_variants:
      minimal: 'Operator: abs (out = |x|). Input shapes: [1, 128], [4, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float16.'
      oracle_guided:
        prompt: 'Operator: abs (out = |x|). Input shapes: [1, 128], [4, 2048], [32, 4096]; perf shape [32, 4096]. Output shape: same_as_input. Dtype: float16. Layout: contiguous. Axis: null. Tiling: flatten each test shape to 1D (size = product of dims) inside the host launcher; the kernel takes `size: int` and tiles 1D with `asc2.tensor(x_ptr, [size])`, `asc2.load(x_gm, [tile_size], offsets=[tile_offset])`, `asc2.store(out, out_gm, offsets=[tile_offset])` — all ranks 1. PERF: use a WIDE tile TILE_SIZE=2048 (NOT the 128 correctness default) to keep the AIV vector pipeline busy and amortise per-tile MTE setup, mirroring the ops-math arch35 elementwise tile policy (math/abs/op_host/arch35/abs_tiling_arch35.cpp); on camodel this raises the ratio vs hand-written aclnnAbs from ~0.20 (TILE=128) to ~0.93 (TILE=2048) at [32, 4096]. CORE_NUM=16; size must be a multiple of TILE_SIZE*CORE_NUM=32768 (aligned_only); partition tile_per_core via `asc2.range(tile_per_block, unroll_factor=2, parallel=True)`. Tail: aligned_only. Accumulator: null. Tolerance: atol=1e-3, rtol=1e-3 against np.abs(x). Platform: Ascend950PR_9599. Build/run: python3.11 kernel.py -r Model -v Ascend950PR_9599. Evidence: kernel.py (skills-on adds design.md + verification.md).'
        examples_policy:
          task_prompt: true
          glossary: true
          golden_kernels: false
          golden_docs: false
          external_web: false
          human_hints: true
      guided: 'Operator: abs (out = |x|). Input shapes: [1, 128], [4, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float16. Layout: contiguous. Axis: null. Tiling: flatten each test shape to 1D (size = product of dims) inside the host launcher; the kernel takes `size: int` and tiles 1D with `asc2.tensor(x_ptr, [size])`, `asc2.load(x_gm, [tile_size], offsets=[tile_offset])`, `asc2.store(out, out_gm, offsets=[tile_offset])` — all ranks 1. Do NOT use 2D `asc2.tensor(..., [num_rows, num_cols])` with 1D `[tile_size]` load and 2D `[row_idx, col_idx]` offsets; v2 raises `RuntimeError: rank of ''tensor_shape'' must match rank of ''shape''`. TILE_SIZE=128, CORE_NUM=16; partition tile_per_core via `asc2.range(tile_per_block, unroll_factor=2, parallel=True)`. Tail: aligned_only — no tail logic required. Accumulator: null. Tolerance: atol=1e-3, rtol=1e-3 against np.abs(x). Platform: Ascend950PR_9599. Build/run: python3.10 kernel.py -r Model -v Ascend950PR_9599. Evidence: kernel.py (skills-on adds design.md + verification.md).'
