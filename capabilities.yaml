    prompt: Help me develop a GELU activation operator on Ascend950PR_9599 (C310) for float16 with shapes [1,128], [4,2048], [32,4096]. GELU is defined as 0.5*x*(1+erf(x/sqrt(2))). For host-side verification, use math.erf via np.vectorize (np.erf and scipy.special.erf are not available).
    prompt_variants:
      minimal: 'Operator: GELU activation (out = 0.5 * x * (1 + erf(x / sqrt(2)))). Input shapes: [1, 128], [4, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float16.'
      guided: 'Operator: GELU activation (out = 0.5 * x * (1 + erf(x / sqrt(2)))); compose asc2.erf, multiplication, and addition. Input shapes: [1, 128], [4, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float16. Layout: contiguous. Axis: null. Tiling: flatten each test shape to 1D (size = product of dims) inside the host launcher; the kernel takes `size: int` and tiles 1D with `asc2.tensor(x_ptr, [size])`, `asc2.load(x_gm, [tile_size], offsets=[tile_offset])`, `asc2.store(out, out_gm, offsets=[tile_offset])` — all ranks 1. Do NOT use 2D `asc2.tensor(..., [num_rows, num_cols])` with a 1D `[tile_size]` load and 2D `[row_idx, col_idx]` offsets; v2 raises `RuntimeError: rank of ''tensor_shape'' must match rank of ''shape''`. Place `asc2.sqrt(0.5)` INSIDE the @asc2.jit body (not at module level — module-level `asc2.*` raises `AttributeError: ''NoneType'' object has no attribute ''create_math_SqrtOp''`). TILE_SIZE=128, CORE_NUM=16; partition tile_per_core via `asc2.range(tile_per_block, unroll_factor=2, parallel=True)`. Tail: aligned_only. Accumulator: null. Tolerance: atol=5e-2, rtol=5e-2 against 0.5 * x * (1 + np.vectorize(math.erf)(x / np.sqrt(2))); host reference uses `import math; _verf = np.vectorize(math.erf)` because np.erf and scipy.special.erf are not in this environment. Platform: Ascend950PR_9599. Build/run: python3.10 kernel.py -r Model -v Ascend950PR_9599. Evidence: kernel.py (skills-on adds design.md + verification.md).'
      oracle_guided:
        prompt: 'Operator: GELU activation (out = 0.5 * x * (1 + erf(x / sqrt(2)))); compose asc2.erf, multiplication, and addition. Input shapes: [1, 128], [4, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float16. Layout: contiguous. Axis: null. Tiling: flatten each test shape to 1D (size = product of dims) inside the host launcher; the kernel takes `size: int` and tiles 1D with `asc2.tensor(x_ptr, [size])`, `asc2.load(x_gm, [tile_size], offsets=[tile_offset])`, `asc2.store(out, out_gm, offsets=[tile_offset])` — all ranks 1. Tail: aligned_only. Accumulator: null. Tolerance: atol=5e-2, rtol=5e-2 against 0.5 * x * (1 + np.vectorize(math.erf)(x / np.sqrt(2))). Platform: Ascend950PR_9599. Build/run: python3.10 kernel.py -r Model -v Ascend950PR_9599. Workaround 1 (rank consistency): v2 strictly checks that the tensor shape rank, the load shape rank, and the offsets rank all match. The agent anti-pattern from the v2 Stage 3.3 drift run is `asc2.tensor(x_ptr, [num_rows, num_cols])` + `asc2.load(x_gm, [tile_size], offsets=[row_idx, col_idx])` — three different ranks; v2 raises `RuntimeError: rank of ''tensor_shape'' must match rank of ''shape''` immediately. Either flatten to 1D (use this cell''s 1D pattern) OR keep 2D and use `[1, tile_size]` load + `[i, 0]` offsets — never mix. Workaround 2 (asc2.* placement): put `asc2.sqrt(0.5)` INSIDE `@asc2.jit`; do not call any `asc2.*` function at Python module level (only `math.*` / Python literals at module scope). Workaround 3 (Tile-on-left): every scalar-times-tile multiplication MUST place the Tile on the LEFT: write `x * 0.5`, `(asc2.erf(x * k) + 1) * 0.5` — never `0.5 * x` etc. The asc2 Tile class lacks `__rmul__`. Reference skeleton: take the Pattern A skeleton from `skills/pyasc-api-patterns/SKILL.md` (1D flatten) and chain the erf body inside the inner loop: `k = asc2.sqrt(0.5); x = asc2.load(...); out = x * (asc2.erf(x * k) + 1) * 0.5; asc2.store(out, ...)`.'
