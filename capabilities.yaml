    regime_note: tanh/Padé approximation form via the lean exp/sigmoid restatement (use asc2.exp, not asc2.tanh — the latter pushed P3/P4/P6 over the 150s sim budget through Phase 9). asc2.erf is excluded — simulator erf is too noisy on float32.
    prompt: Help me develop a GELU activation operator on Ascend950PR_9599 (C310) for float32 with shapes [1,128], [4,2048], [32,4096]. Use the lean exp/sigmoid restatement of the tanh/Padé form (mathematically identical to PyTorch's gelu(approximate='tanh'), but cheaper per tile and within the sim budget) - GELU(x) = x / (1 + exp(-sqrt(8/pi) * (x + 0.044715 * x^3))). Use asc2.exp; do NOT use asc2.tanh (it pushed the cell over the 150s sim budget) and do NOT use asc2.erf (simulator erf is too noisy on float32 — this is documented in the cell's regime_note).
    prompt_variants:
      minimal: 'Operator: GELU activation, tanh/Padé form (out = x / (1 + exp(-sqrt(8/pi) * (x + 0.044715 * x^3))), equivalent to 0.5 * x * (1 + tanh(sqrt(2/pi) * (x + 0.044715 * x^3)))). Input shapes: [1, 128], [4, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float32.'
      guided: 'Operator: GELU activation, tanh/Padé approximation form expressed via the lean exp/sigmoid restatement: out = x / (1 + exp(-sqrt(8/pi) * (x + 0.044715 * x^3))). Mathematically identical to 0.5 * x * (1 + tanh(sqrt(2/pi) * (x + 0.044715 * x^3))), but uses asc2.exp + add + div (one fewer asc2 op per tile, no tanh dependency) and lands inside the simulator budget. DO NOT use asc2.tanh — Phase 9 evidence shows that variant timed out at the 150s sim limit. DO NOT use asc2.erf — simulator erf is too noisy on float32. Input shapes: [1, 128], [4, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float32. Layout: contiguous. Axis: null. Tiling: Pattern A (rank-consistent 1D flatten) — host launcher flattens each test shape to 1D (size = product of dims); the kernel takes `size: int` and tiles 1D with `asc2.tensor(x_ptr, [size])`, `asc2.load(x_gm, [tile_size], offsets=[tile_offset])`, `asc2.store(out, out_gm, offsets=[tile_offset])` — all ranks 1. Do NOT use 2D `asc2.tensor(..., [num_rows, num_cols])` with a 1D `[tile_size]` load and 2D `[row_idx, col_idx]` offsets; v2 raises `RuntimeError: rank of ''tensor_shape'' must match rank of ''shape''`. Pin TILE_SIZE=64, CORE_NUM=16 (wider tiles trigger a wide-tile lowering bug on C310 that writes only the first 64 elements). Compute `GELU_C = 0.044715` and `NEG_SQRT_EIGHT_OVER_PI = -math.sqrt(8.0 / math.pi)` as Python module-level constants OUTSIDE the @asc2.jit body. Inside the kernel: `x_cub = x * x * x; inner = (x_cub * GELU_C + x) * NEG_SQRT_EIGHT_OVER_PI; out = x / (asc2.exp(inner) + 1)`. Tile-on-left rule: every scalar-times-Tile multiplication MUST place the Tile on the left (`x_cub * GELU_C`, NOT `GELU_C * x_cub`). Tail: aligned_only. Accumulator: null. Tolerance: atol=1e-2, rtol=1e-2 against the canonical numpy reference `0.5 * x * (1 + np.tanh(np.sqrt(2.0 / np.pi) * (x + 0.044715 * x**3)))` (mathematically identical at the assert_close level). Platform: Ascend950PR_9599. Build/run: python3.10 kernel.py -r Model -v Ascend950PR_9599. Evidence: kernel.py (skills-on adds design.md + verification.md).'
      oracle_guided:
        prompt: 'Operator: GELU activation, tanh/Padé approximation form. Use the LEAN exp/sigmoid restatement (mathematically identical to the canonical tanh form but cheaper per tile and within the 150s simulator budget): out = x / (1 + exp(-sqrt(8/pi) * (x + 0.044715 * x^3))). DO NOT use asc2.tanh — it triggers Timeout after 150s on this cell (recorded in docs/skill-value-q1-findings.md Anomaly #1). Input shapes: [1, 128], [4, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float32. Layout: contiguous. Axis: null. Tiling: Pattern A (rank-consistent 1D flatten) — host launcher flattens each test shape to 1D `size = product(shape)`; the kernel takes `size: int` and uses `asc2.tensor(x_ptr, [size])`, `asc2.load(x_gm, [tile_size], offsets=[tile_offset])`, `asc2.store(out, out_gm, offsets=[tile_offset])` — all ranks 1. TILE_SIZE=64, CORE_NUM=16 (conservative single-lane width — wider tiles can hit a C310 lowering bug that writes only the first 64 elements). Module-level constants (outside @asc2.jit): `GELU_C = 0.044715` and `NEG_SQRT_EIGHT_OVER_PI = -math.sqrt(8.0 / math.pi)`. Reference skeleton (copy verbatim, adjust the docstring only):

```
import math, numpy as np, asc, asc2

TILE_SIZE = 64
CORE_NUM = 16
GELU_C = 0.044715
NEG_SQRT_EIGHT_OVER_PI = -math.sqrt(8.0 / math.pi)

@asc2.jit(always_compile=True)
def gelu_kernel(x_ptr: asc.GlobalAddress, out_ptr: asc.GlobalAddress,
                size: int, tile_size: asc.ConstExpr[int],
                tile_per_block: asc.ConstExpr[int]):
    x_gm = asc2.tensor(x_ptr, [size])
    out_gm = asc2.tensor(out_ptr, [size])
    base_offset = asc2.block_idx() * tile_size * tile_per_block
    for i in asc2.range(tile_per_block, unroll_factor=2, parallel=True):
        tile_offset = base_offset + i * tile_size
        x = asc2.load(x_gm, [tile_size], offsets=[tile_offset])
        x_cub = x * x * x
        inner = (x_cub * GELU_C + x) * NEG_SQRT_EIGHT_OVER_PI
        out = x / (asc2.exp(inner) + 1)
        asc2.store(out, out_gm, offsets=[tile_offset])
```

