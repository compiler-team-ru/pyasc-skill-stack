schema_version: '3'
tiers:
  elementwise:
    level: 0
    description: 'Template-substitution kernels: load -> single op -> store'
    note: One unary + one binary representative covers the pattern
  reduction:
    level: 1
    description: Output shape differs from input; accumulation logic
  composed:
    level: 2
    description: No single asc2 builtin; agent must compose multiple API calls
  advanced:
    level: 3
    description: Multi-dimensional tiling, accumulator management, placement
operations:
- name: abs
  tier: elementwise
  asc2_api: asc2.abs(x)
  representative_of:
  - exp
  - log
  - sqrt
  - relu
  - erf
  - sin
  - cos
  - neg
  - ceil
  - floor
  - rsqrt
  - tanh
  cells:
  - dtype: float16
    prompt: Help me develop an abs operator that supports float16 data type. The shape
      is mainly [1,128], [4,2048], [32,4096].
    prompt_variants:
      minimal: Generate an abs kernel for float16.
      guided: Generate an abs kernel using asc2.abs() with tiling via asc2.range.
        Use float16, shapes [1,128], [4,2048], [32,4096].
    shapes:
    - - 1
      - 128
    - - 4
      - 2048
    - - 32
      - 4096
    golden_status: confirmed
    golden: golden/kernels/abs_f16.py
    golden_evidence: evidence/abs-f16-golden.json
    generative_status: confirmed
    generative_evidence: evidence/abs-f16-generative.json
  - dtype: float32
    prompt: Help me develop an abs operator that supports float32 data type. The shape
      is mainly [1,128], [4,2048], [32,4096].
    prompt_variants:
      minimal: Generate an abs kernel for float32.
      guided: Generate an abs kernel using asc2.abs() with tiling via asc2.range.
        Use float32, shapes [1,128], [4,2048], [32,4096].
    shapes:
    - - 1
      - 128
    - - 4
      - 2048
    - - 32
      - 4096
    golden_status: untested
    generative_status: confirmed
    generative_evidence: evidence/abs-f32-generative.json
- name: add
  tier: elementwise
  asc2_api: x + y
  representative_of:
  - sub
  - mul
  - div
  cells:
  - dtype: float16
    prompt: Help me develop an add operator that supports float16 data type. The shape
      is mainly [1,128], [4,2048], [32,4096].
    prompt_variants:
      guided: Generate an add (element-wise addition) kernel for float16. Two input
        tensors x and y, output x+y. Use asc2.load/store and asc2.range for tiling.
        Shapes [1,128], [4,2048], [32,4096]. Generate test data as rng.random(shape,
        dtype=np.float32).astype(np.float16). Use atol=1e-3, rtol=1e-3.
    shapes:
    - - 1
      - 128
    - - 4
      - 2048
    - - 32
      - 4096
    golden_status: untested
    generative_status: confirmed
    generative_evidence: evidence/add-f16-generative.json
- name: reduce_sum
  tier: reduction
  asc2_api: asc2.reduce_sum(x)
  representative_of:
  - reduce_max
  - reduce_min
  - reduce_prod
  cells:
  - dtype: float32
    prompt: Help me develop a reduce_sum operator that supports float32 data type.
      The input shape is [32, 4096], reduce along the last axis to produce shape [32].
      Each row should be summed independently.
    prompt_variants:
      guided: Generate a reduce_sum kernel for float32 with shape [32, 4096]. Use
        asc2.reduce_sum on each row, wrap scalar result with asc2.full([1, OUT_PAD],
        s, dtype=row.dtype) for 32-byte alignment (OUT_PAD=8 for float32). Use asc2.range
        for row distribution. Verify with np.testing.assert_allclose(out, expected,
        atol=1e-2, rtol=1e-3).
    shapes:
    - - 32
      - 4096
    golden_status: confirmed
    golden: golden/kernels/reduce_sum_f32.py
    golden_evidence: evidence/reduce_sum-f32-golden.json
    generative_status: confirmed
    generative_evidence: evidence/reduce_sum-f32-generative.json
  - dtype: float16
    prompt: Help me develop a reduce_sum operator that supports float16 data type.
      The input shape is [32, 4096], reduce along the last axis to produce shape [32].
      Each row should be summed independently. Use OUT_PAD=16 for 32-byte alignment
      with float16. Use atol=2.0, rtol=5e-2 for verification (float16 reductions accumulate
      error).
    prompt_variants:
      guided: Generate a reduce_sum kernel for float16 with shape [32, 4096]. Use
        asc2.reduce_sum on each row, wrap scalar result with asc2.full([1, OUT_PAD],
        s, dtype=row.dtype) for 32-byte alignment (OUT_PAD=16 for float16). Use asc2.range
        for row distribution. Generate test data as rng.random(shape, dtype=np.float32).astype(np.float16).
        Verify with np.testing.assert_allclose(out_f32, expected_f32, atol=2.0, rtol=5e-2).
    shapes:
    - - 32
      - 4096
    golden_status: confirmed
    golden: golden/kernels/reduce_sum_f16.py
    golden_evidence: evidence/reduce_sum-f16-golden.json
    generative_status: confirmed
    generative_evidence: evidence/reduce_sum-f16-generative.json
- name: gelu
  tier: composed
  asc2_api: 0.5 * x * (1 + asc2.erf(x / sqrt(2)))
  note: No asc2.gelu builtin; must compose from erf, mul, add
  cells:
  - dtype: float16
    prompt: Help me develop a GELU activation operator that supports float16 data
      type. The shape is mainly [1,128], [4,2048], [32,4096]. GELU is defined as 0.5*x*(1+erf(x/sqrt(2))).
      For host-side verification, use math.erf with np.vectorize (not np.erf or scipy).
    prompt_variants:
      minimal: Generate a GELU activation kernel for float16.
      guided: 'Generate a GELU kernel composing asc2.erf, multiplication, and addition:
        0.5*x*(1+erf(x/sqrt(2))). Use float16, shapes [1,128], [4,2048], [32,4096].
        Use asc2.load/store and asc2.range for tiling. For host-side verification
        use: import math; _verf = np.vectorize(math.erf). Do NOT use np.erf or scipy.special.erf.
        Use atol=5e-2, rtol=5e-2.'
    shapes:
    - - 1
      - 128
    - - 4
      - 2048
    - - 32
      - 4096
    golden_status: confirmed
    golden: golden/kernels/gelu_f16.py
    golden_evidence: evidence/gelu-f16-golden.json
    generative_status: confirmed
    generative_evidence: evidence/gelu-f16-generative.json
  - dtype: float32
    prompt: 'Help me develop a GELU activation operator that supports float32 data
      type. The shape is mainly [1,128], [4,2048], [32,4096]. GELU is defined as 0.5*x*(1+erf(x/sqrt(2))).
      For host-side verification, use math.erf with np.vectorize (not np.erf or scipy).
      IMPORTANT: The simulator erf has significant numerical error for float32. Use
      np.testing.assert_allclose(out, expected, atol=2.0, rtol=0.1).'
    prompt_variants:
      guided: 'Generate a GELU kernel for float32: 0.5*x*(1+erf(x/sqrt(2))). Use asc2.erf
        for the kernel op. For host-side verification, use: import math; _verf = np.vectorize(math.erf);
        expected = 0.5*x*(1+_verf(x/np.sqrt(2))). Do NOT use np.erf or scipy.special.erf.
        The simulator erf has large numerical error for float32 -- use np.testing.assert_allclose(out,
        expected, atol=2.0, rtol=0.1). Shapes [1,128], [4,2048], [32,4096].'
    shapes:
    - - 1
      - 128
    - - 4
      - 2048
    - - 32
      - 4096
    golden_status: confirmed
    golden: golden/kernels/gelu_f32.py
    golden_evidence: evidence/gelu-f32-golden.json
    generative_status: confirmed
    generative_evidence: evidence/gelu-f32-generative.json
- name: leaky_relu
  tier: composed
  asc2_api: asc2.where(x >= 0, x, alpha * x)
  note: Tests conditional logic with asc2.where
  cells:
  - dtype: float16
    prompt: Help me develop a leaky_relu operator that supports float16 data type
      with alpha=0.01. The shape is mainly [1,128], [4,2048], [32,4096].
    prompt_variants:
      guided: Generate a leaky_relu kernel for float16 with alpha=0.01. Use asc2.where(x
        >= 0, x, x * alpha) for the kernel op. Shapes [1,128], [4,2048], [32,4096].
        Generate test data as rng.random(shape, dtype=np.float32).astype(np.float16).
        Use atol=1e-3, rtol=1e-3.
    shapes:
    - - 1
      - 128
    - - 4
      - 2048
    - - 32
      - 4096
    golden_status: confirmed
    golden: golden/kernels/leaky_relu_f16.py
    golden_evidence: evidence/leaky_relu-f16-golden.json
    generative_status: confirmed
    generative_evidence: evidence/leaky_relu-f16-generative.json
- name: softmax
  tier: advanced
  asc2_api: asc2.softmax(x)
  note: Single builtin for tiles that fit; manual decomposition for long rows
  cells:
  - dtype: float16
    prompt: Help me develop a softmax operator that supports float16 data type. Test
      with shape [32, 4096] ONLY. Do not test additional shapes -- the simulator is
      slow. Apply softmax along the last axis so each row sums to 1. Use atol=5e-2,
      rtol=5e-2 for verification.
    prompt_variants:
      guided: 'Generate a softmax kernel for float16, shape [32, 4096] ONLY. Use asc2.softmax()
        on a block of full rows. Distribute rows across cores: block_size = ceildiv(num_rows,
        CORE_NUM), start_row = block_idx * block_size. Do NOT test additional shapes.
        For reference, compute numpy softmax: shifted = x - x.max(axis=1, keepdims=True);
        e = np.exp(shifted); expected = e / e.sum(axis=1, keepdims=True). Do NOT use
        scipy. Verify: np.testing.assert_allclose(out.astype(np.float32), expected.astype(np.float32),
        atol=5e-2, rtol=5e-2). Generate test data as rng.random(shape, dtype=np.float32).astype(np.float16).'
    shapes:
    - - 32
      - 4096
    golden_status: confirmed
    golden: golden/kernels/softmax_f16.py
    golden_evidence: evidence/softmax-f16-golden.json
    generative_status: confirmed
    generative_evidence: evidence/softmax-f16-generative.json
- name: matmul
  tier: advanced
  asc2_api: asc2.matmul(a, b) or `a @ b`
  note: Matmul uses the cube unit and requires the Ascend950PR_9599 simulator. Inputs
    must be torch.Tensor (numpy arrays produce zeros on the simulator). Result tile
    dtype is always float32 (cube accumulator). Load A to L0A and B to L0B before
    computing.
  cells:
  - dtype: float16
    platform: Ascend950PR_9599
    prompt: Help me develop a tiled matrix multiplication operator (asc2 API) for
      float16 inputs producing float32 output. Use small fixed shapes such as M=K=N=16
      or (M=32, K=16, N=32). The kernel must use torch.Tensor (NOT numpy) for host-side
      data and torch.testing.assert_close for verification. Load A to asc2.TileLocation.L0A
      and B to asc2.TileLocation.L0B, then use `a @ b` (or asc2.matmul) and asc2.store
      the float32 result. Target the Ascend950PR_9599 simulator (pass -v Ascend950PR_9599).
      Verify with torch.testing.assert_close(c, c_ref, atol=1e-2, rtol=1e-2) where
      c_ref = a.to(torch.float32) @ b.to(torch.float32).
    prompt_variants:
      guided: 'Generate a tiled matmul kernel for float16 inputs (float32 output)
        using the asc2 API. Reference golden/kernels/matmul_f16.py for the proven
        pattern. Requirements: (1) Use torch.Tensor for host inputs (a, b dtype=torch.float16)
        and a torch.float32 zero-initialized output buffer c. The simulator silently
        produces zeros for matmul with numpy arrays, so torch is mandatory. (2) Inside
        @asc2.jit: asc2.tensor for a/b/c, asc2.load with location=asc2.TileLocation.L0A
        for the left operand and L0B for the right operand, then `a_tile @ b_tile`,
        then asc2.store the float32 result. (3) Use small shapes that fit L0A/L0B
        (each ≤ 64 KiB): start with m=k=n=16, core_num=1, m_tile=n_tile=16. Tile sizes
        must be multiples of 16. (4) Set platform="Ascend950PR_9599" in argparse default.
        matmul does NOT run on Ascend910B1. (5) Verify with torch.testing.assert_close(c,
        c_ref, atol=1e-2, rtol=1e-2) where c_ref = a.to(torch.float32) @ b.to(torch.float32).'
    shapes:
    - - 16
      - 16
    - - 32
      - 32
    golden_status: confirmed
    golden: golden/kernels/matmul_f16.py
    golden_evidence: evidence/matmul-f16-golden.json
    generative_status: confirmed
    generative_evidence: evidence/matmul-f16-generative.json
    semantic_check:
    - asc2.matmul
    - '@'
    - torch.Tensor
    - TileLocation.L0A
- name: rms_norm
  tier: advanced
  asc2_api: two-kernel + host dispatcher (full_row, split_d)
  note: C310 (Ascend950PR_9599) host-side dispatch between full_row and split_d kernels,
    mirroring CANN KernelRmsNormRegBase (tiling key 5000) and KernelRmsNormRegBaseSplitD
    (tiling key 2001) in opp/built-in/op_impl/ai_core/tbe/impl/ops_nn/ascendc/rms_norm/rms_norm.cpp.
    Inputs are torch.Tensor (numpy is silently zeroed on the C310 simulator path).
    The dispatcher picks full_row when num_cols * dtype_bytes fits a conservative
    UB budget (and num_cols % 8 == 0), otherwise streams along D in tile_cols=64 tiles
    with host-side zero padding. Both shape regimes are exercised in a single verification
    call.
  cells:
  - dtype: float16
    prompt: Create an RMSNorm kernel capable of handling dynamic string lengths. It
      must utilize all available AI Cores by processing the data along the first or
      last dimension.
    prompt_variants:
      guided: 'Build an asc2 RMSNorm capability for float16 on C310 (Ascend950PR_9599).
        Use torch.Tensor inputs (numpy is silently zeroed on C310). Provide TWO @asc2.jit
        kernels mirroring CANN arch35: a full_row kernel (KernelRmsNormRegBase analogue)
        where num_cols is asc.ConstExpr[int] and the row tile fits in UB, and a split_d
        kernel (KernelRmsNormRegBaseSplitD analogue) where both num_rows and num_cols
        are runtime int and the kernel streams along D in tile_cols=64 tiles with
        host-side zero padding. Both kernels distribute rows via `for row in asc2.range(asc2.block_idx(),
        num_rows, asc2.block_num())`. Cast loaded tiles to float32 via `.to(asc.float32)`
        before accumulating sum_sq via asc2.reduce_sum; cast back via `.to(x.dtype)`
        before asc2.store. Seed sum_sq in split_d with a PlainValue zero: `sum_sq
        = asc2.reduce_sum(asc2.full([1, tile_cols], 0.0, dtype=asc.float32))`. Provide
        a host-side dispatcher rms_norm_launch(x, gamma, eps) that picks full_row
        when num_cols * dtype_bytes <= 64KB and num_cols % 8 == 0, otherwise split_d.
        Verify both regimes in one run with atol=2e-2, rtol=2e-2 (full_row, shape
        (8, 256)) and atol=5e-2, rtol=5e-2 (split_d, shape (8, 1055)) against a torch
        reference.'
    shapes:
    - - 8
      - 256
    - - 8
      - 1055
    golden_status: confirmed
    golden: golden/kernels/rms_norm_f16.py
    golden_evidence: evidence/rms_norm-f16-golden.json
    generative_status: pending
    generative_evidence: evidence/rms_norm-f16-generative.json
    semantic_check:
    - asc2.reduce_sum
    - split_d
    - full_row
  - dtype: float32
    prompt: Create an RMSNorm kernel capable of handling dynamic string lengths. It
      must utilize all available AI Cores by processing the data along the first or
      last dimension. Use float32 inputs.
    prompt_variants:
      guided: 'Build an asc2 RMSNorm capability for float32 on C310 (Ascend950PR_9599).
        Use torch.Tensor inputs (numpy is silently zeroed on C310). Provide TWO @asc2.jit
        kernels mirroring CANN arch35: a full_row kernel (KernelRmsNormRegBase analogue)
        where num_cols is asc.ConstExpr[int] and the row tile fits in UB, and a split_d
        kernel (KernelRmsNormRegBaseSplitD analogue) where both num_rows and num_cols
        are runtime int and the kernel streams along D in tile_cols=64 tiles with
        host-side zero padding. Both kernels distribute rows via `for row in asc2.range(asc2.block_idx(),
        num_rows, asc2.block_num())`. Use asc2.reduce_sum for sum_sq accumulation.
        Seed sum_sq in split_d with a PlainValue zero: `sum_sq = asc2.reduce_sum(asc2.full([1,
        tile_cols], 0.0, dtype=asc.float32))`. Provide a host-side dispatcher rms_norm_launch(x,
        gamma, eps) that picks full_row when num_cols * dtype_bytes <= 64KB and num_cols
        % 8 == 0, otherwise split_d. Verify both regimes in one run with atol=1e-4,
        rtol=1e-4 against a torch reference at shapes (8, 256) and (8, 1055).'
    shapes:
    - - 8
      - 256
    - - 8
      - 1055
    golden_status: confirmed
    golden: golden/kernels/rms_norm_f32.py
    golden_evidence: evidence/rms_norm-f32-golden.json
    generative_status: pending
    generative_evidence: evidence/rms_norm-f32-generative.json
    semantic_check:
    - asc2.reduce_sum
    - split_d
    - full_row
