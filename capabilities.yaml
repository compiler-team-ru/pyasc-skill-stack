- name: drop_out_do_mask
  tier: composed
  asc2_api: out = (data * mask) * scale (load x2 -> mul -> scale -> store)
  note: 'DropoutDoMask apply-phase, out = data * mask * (1/keep_prob); vector-only (AIV) multi-input elementwise. Comparability disclosure (no shortcut): the canonical aclnnDropoutDoMask reference consumes a bit-packed uint8 mask (1 bit/element) and unpacks it on-chip, while this generated kernel consumes a dense float16 keep-mask. The dominant cost on BOTH sides is the per-element multiply+scale over the same N elements; the reference''s bit-unpack is a small fixed addend. Shape/dtype/element-count are pinned to the same comparability contract, and the reference is the true aclnnDropoutDoMask (ops-math random/drop_out_do_mask).'
  cells:
  - dtype: float16
    platform: Ascend950PR_9599
    shape_regime: fixed
    reduce_axis: null
    output_shape: same_as_input
    accumulator_dtype: null
    identity: null
    tail_behavior: aligned_only
    padding: null
    partitioning: tile_per_core
    unsupported_regimes: []
    examples_policy:
      task_prompt: true
      glossary: true
      golden_kernels: false
      golden_docs: false
      external_web: false
      human_hints: false
    prompt: Help me develop the DropoutDoMask apply phase (out = data * mask * (1/keep_prob)) on Ascend950PR_9599 (C310) for float16 with a dense keep-mask, shapes [16,2048] and [32,4096].
    prompt_variants:
      minimal: 'Operator: DropoutDoMask apply phase (out = data * mask * (1/keep_prob)); data and a dense {0.,1.} keep-mask are inputs, keep_prob is a scalar. Input shapes: [16, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float16.'
      guided: 'Operator: DropoutDoMask apply phase: out = data * mask * scale where scale = 1/keep_prob. Inputs: data (float16) and a dense float16 keep-mask of {0.,1.} (same shape as data); keep_prob is a host scalar folded into scale (asc.ConstExpr[float]). Input shapes: [16, 2048], [32, 4096]. Output shape: same_as_input. Dtype: float16. Layout: contiguous. Axis: null. Tiling: flatten to 1D in the host launcher; the kernel takes `size: int`, two GlobalAddress inputs (data, mask) + one output, and tiles 1D with `asc2.tensor(ptr, [size])`, two `asc2.load(..., [tile_size], offsets=[off])`, `out = (data_t * mask_t) * scale`, `asc2.store(out, out_gm, offsets=[off])` — all ranks 1. TILE_SIZE=2048, CORE_NUM=16; size must be a multiple of TILE_SIZE*CORE_NUM=32768 (aligned_only); partition tile_per_core via `asc2.range(tile_per_block, unroll_factor=2, parallel=True)`. Tail: aligned_only. Accumulator: null. Tolerance: atol=1e-2, rtol=1e-2 against (data*mask*(1/keep_prob)). Platform: Ascend950PR_9599. Build/run: python3.11 kernel.py -r Model -v Ascend950PR_9599. Evidence: kernel.py (skills-on adds design.md + verification.md).'
      oracle_guided:
        prompt: 'Operator: DropoutDoMask apply phase: out = data * mask * scale where scale = 1/keep_prob. Inputs: data (float16) and a dense float16 keep-mask of {0.,1.} (same shape as data); keep_prob is a host scalar folded into scale (asc.ConstExpr[float]). Input shapes: [16, 2048], [32, 4096]; perf shape [32, 4096]. Output shape: same_as_input. Dtype: float16. Layout: contiguous. Axis: null. Tiling: flatten to 1D in the host launcher; the kernel takes `size: int`, two GlobalAddress inputs (data, mask) + one output, tiles 1D with `asc2.tensor(ptr, [size])`, two `asc2.load(..., [tile_size], offsets=[off])`, `out = (data_t * mask_t) * scale`, `asc2.store(...)`. PERF: WIDE tile TILE_SIZE=2048, CORE_NUM=16, double-buffer via `asc2.range(tile_per_block, unroll_factor=2, parallel=True)`; size must be a multiple of TILE_SIZE*CORE_NUM=32768 (aligned_only). This two-load masked multiply lands ratio ~0.74 vs hand-written aclnnDropoutDoMask at [32, 4096]. Comparability: the canonical reference bit-unpacks a uint8 mask; the dense float16 keep-mask here has identical per-element multiply+scale cost (the dominant term). Tail: aligned_only. Accumulator: null. Tolerance: atol=1e-2, rtol=1e-2. Platform: Ascend950PR_9599. Build/run: python3.11 kernel.py -r Model -v Ascend950PR_9599. Workaround: Reference golden/kernels/drop_out_do_mask_f16.py for the proven two-input wide-tile structure and the dense-mask comparability note.'
        examples_policy:
