- name: batch_norm_v3
  tier: advanced
  asc2_api: per-channel reduce_sum (over N,L) -> mean/var -> rsqrt -> vector affine
  note: 'BatchNormV3 training-mode forward on [N,C,L]=[32,64,64], reducing over N and L per channel. reduce_axis is recorded as 0 (the schema permits a single int) but the reduction is genuinely MULTI-AXIS (N and L); see the kernel docstring. Realized ENTIRELY with AIV vector + reduce_sum primitives (NO cube), so it stays in scope for the vector-only generation claim despite being multi-I/O. The strided per-channel reduction is done ON-CHIP (no host transpose): x is viewed as [N*C, L] and each core reduces a [ch, L] strided tile over the L axis for its 8 channels. torch.Tensor inputs required (C310 numpy gotcha). HONEST PERF: this strided reduction is heavily DMA/instruction-bound on the camodel (gen 62588 vs hand-written aclnnBatchNorm 6110, ratio ~0.10) and does NOT clear the 0.70 gate -- a correctness-confirmed generative cell with a documented perf miss, not a perf pass.'
  cells:
  - dtype: float32
    platform: Ascend950PR_9599
    shape_regime: fixed
    reduce_axis: 0
    output_shape: same_as_input
    accumulator_dtype: float32
    identity: '0'
    tail_behavior: aligned_only
    padding: null
    partitioning: row_per_core
    unsupported_regimes: []
    examples_policy:
      task_prompt: true
      glossary: true
      golden_kernels: false
      golden_docs: false
      external_web: false
      human_hints: false
    prompt: Help me develop the BatchNormV3 training-mode forward on Ascend950PR_9599 (C310) for float32 on a [32,64,64] [N,C,L] tensor (per-channel reduction over N and L, then affine normalize), emitting out + saveMean + saveInvStd.
    prompt_variants:
      minimal: 'Operator: BatchNormV3 training forward. Input x [N,C,L]=[32,64,64], weight/bias [C], eps. Per-channel (over N,L): mean, var, invstd=1/sqrt(var+eps); out=(x-mean)*invstd*weight+bias. Outputs out [N,C,L], saveMean [C], saveInvStd [C]. Dtype: float32.'
      guided: 'Operator: BatchNormV3 training-mode forward. x is [N,C,L]=[32,64,64] (float32); weight/bias are [C] (float32); eps=1e-5. For each channel c reduce over N and L: mean[c]=sum/(N*L), var[c]=sumsq/(N*L)-mean^2, invstd[c]=1/sqrt(var+eps); out[n,c,l]=(x-mean[c])*invstd[c]*weight[c]+bias[c]=x*scale[c]+shift[c]. Outputs: out [N,C,L], saveMean [C], saveInvStd [C]. Inputs MUST be torch.Tensor (numpy is silently zeroed on the C310 simulator path). Tiling: view x as [N*C, L]; partition C across CORE_NUM=8 cores, ch=8 channels/core; each core loads a [ch, L] strided tile per sample n (rows n*C+c0..), accumulates per-channel sum/sumsq via `asc2.reduce_sum(blk, 1)` (reduce the L axis -> [ch]); after the N loop compute mean/var/invstd ([ch] tiles, use asc2.rsqrt); load weight/bias [ch] slices; scale=w*invstd, shift=b-scale*mean; broadcast scale/shift via `asc2.broadcast_to(asc2.expand_dims(scale, 1), ch, L)`; second pass reloads each [ch,L] tile and stores x*scale+shift. Shape dims used in tile shapes must be literal ints (module constants), not ConstExpr (the shape validators reject ConstExpr). Accumulator: float32. Tolerance: mean/invstd atol=rtol=1e-3, out atol=rtol=1e-2 vs a torch fp64 reference. Platform: Ascend950PR_9599. Build/run: python3.11 kernel.py -r Model -v Ascend950PR_9599.'
      oracle_guided:
        prompt: 'Operator: BatchNormV3 training-mode forward. x [N,C,L]=[32,64,64] float32; weight/bias [C] float32; eps=1e-5. Per channel reduce over N and L: mean=sum/(N*L), var=sumsq/(N*L)-mean^2, invstd=1/sqrt(var+eps); out=x*scale+shift with scale=weight*invstd, shift=bias-scale*mean. Outputs out [N,C,L], saveMean [C], saveInvStd [C]. Inputs MUST be torch.Tensor (C310 zeroes numpy for this reduction pattern). On-chip strided reduction (NO host transpose): view x as [N*C, L]; CORE_NUM=8, ch=8 channels/core; per sample n load a [ch, L] strided tile at row n*C+c0 and accumulate `asc2.reduce_sum(blk, 1)` -> [ch] per-channel partials (2D reduce over the L axis is exact; a 3D [1,ch,L] reduce over axis 2 silently fills only channel 0 -- avoid it). Use asc2.rsqrt on the [ch] var tile; broadcast scale/shift with `asc2.broadcast_to(asc2.expand_dims(scale, 1), ch, L)` (broadcast_to takes VARARG dims, not a list). Tile-shape dims must be literal ints (module constants N_SIZE/C_SIZE/L_SIZE/CH), NOT ConstExpr. HONEST PERF NOTE: this strided per-channel reduction is DMA/instruction-bound (~62588 ticks vs 6110 aclnnBatchNorm, ratio ~0.10); the goal here is a correct vector-only realization, not beating the reference. Tolerance: mean/invstd 1e-3, out 1e-2 vs torch fp64. Platform: Ascend950PR_9599. Build/run: python3.11 kernel.py -r Model -v Ascend950PR_9599. Workaround: Reference golden/kernels/batch_norm_v3_f32.py for the exact channel-vectorized strided-reduce + broadcast affine structure.'
