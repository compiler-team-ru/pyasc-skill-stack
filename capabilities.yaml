schema_version: "3"

# Complexity tiers: each tier represents a structurally distinct generative
# challenge.  Proving a representative operation in a tier gives high
# confidence that other operations at the same tier can be generated.

tiers:
  elementwise:
    level: 0
    description: "Template-substitution kernels: load -> single op -> store"
    note: "One unary + one binary representative covers the pattern"
  reduction:
    level: 1
    description: "Output shape differs from input; accumulation logic"
  composed:
    level: 2
    description: "No single asc2 builtin; agent must compose multiple API calls"
  advanced:
    level: 3
    description: "Multi-dimensional tiling, accumulator management, placement"

# Status definitions (apply to both golden_status and generative_status):
#   confirmed   - Evidence JSON exists and records a pass
#   golden_only - Golden kernel verified, no evidence JSON yet
#   pending     - Prompt/golden defined but not yet run
#   untested    - Operation exists but not tracked
#   blocked     - Known issue prevents verification (see notes)

operations:

  # --- Tier 0: Elementwise ---

  - name: abs
    tier: elementwise
    asc2_api: "asc2.abs(x)"
    representative_of:
      - exp
      - log
      - sqrt
      - relu
      - erf
      - sin
      - cos
      - neg
      - ceil
      - floor
      - rsqrt
      - tanh
    cells:
      - dtype: float16
        prompt: >-
          Help me develop an abs operator that supports float16 data type.
          The shape is mainly [1,128], [4,2048], [32,4096].
        prompt_variants:
          minimal: "Generate an abs kernel for float16."
          guided: >-
            Generate an abs kernel using asc2.abs() with tiling via asc2.range.
            Use float16, shapes [1,128], [4,2048], [32,4096].
        shapes:
          - [1, 128]
          - [4, 2048]
          - [32, 4096]
        golden_status: confirmed
        golden: golden/kernels/abs_f16.py
        golden_evidence: evidence/abs-f16-golden.json
        generative_status: confirmed
        generative_evidence: evidence/abs-f16-generative.json

  - name: add
    tier: elementwise
    asc2_api: "x + y"
    representative_of:
      - sub
      - mul
      - div
    cells:
      - dtype: float16
        prompt: >-
          Help me develop an add operator that supports float16 data type.
          The shape is mainly [1,128], [4,2048], [32,4096].
        shapes:
          - [1, 128]
          - [4, 2048]
          - [32, 4096]
        golden_status: untested
        generative_status: confirmed
        generative_evidence: evidence/add-f16-generative.json

  # --- Tier 1: Reduction ---

  - name: reduce_sum
    tier: reduction
    asc2_api: "asc2.reduce_sum(x)"
    representative_of:
      - reduce_max
      - reduce_min
      - reduce_prod
    cells:
      - dtype: float32
        prompt: >-
          Help me develop a reduce_sum operator that supports float32 data type.
          The input shape is [32, 4096], reduce along the last axis to produce
          shape [32]. Each row should be summed independently.
        shapes:
          - [32, 4096]
        golden_status: golden_only
        golden: golden/kernels/reduce_sum_f32.py
        golden_evidence: evidence/reduce_sum-f32-golden.json
        generative_status: confirmed
        generative_evidence: evidence/reduce_sum-f32-generative.json
      - dtype: float16
        prompt: >-
          Help me develop a reduce_sum operator that supports float16 data type.
          The input shape is [32, 4096], reduce along the last axis to produce
          shape [32]. Each row should be summed independently.
        shapes:
          - [32, 4096]
        golden_status: untested
        generative_status: pending

  # --- Tier 2: Composed ---

  - name: gelu
    tier: composed
    asc2_api: "0.5 * x * (1 + asc2.erf(x / sqrt(2)))"
    note: "No asc2.gelu builtin; must compose from erf, mul, add"
    cells:
      - dtype: float16
        prompt: >-
          Help me develop a GELU activation operator that supports float16 data
          type. The shape is mainly [1,128], [4,2048], [32,4096]. GELU is
          defined as 0.5*x*(1+erf(x/sqrt(2))).
        prompt_variants:
          minimal: "Generate a GELU activation kernel for float16."
          guided: >-
            Generate a GELU kernel composing asc2.erf, multiplication, and
            addition: 0.5*x*(1+erf(x/sqrt(2))). Use float16, shapes [1,128],
            [4,2048], [32,4096]. Use asc2.load/store and asc2.range for tiling.
        shapes:
          - [1, 128]
          - [4, 2048]
          - [32, 4096]
        golden_status: golden_only
        golden: golden/kernels/gelu_f16.py
        golden_evidence: evidence/gelu-f16-golden.json
        generative_status: confirmed
        generative_evidence: evidence/gelu-f16-generative.json
      - dtype: float32
        prompt: >-
          Help me develop a GELU activation operator that supports float32 data
          type. The shape is mainly [1,128], [4,2048], [32,4096]. GELU is
          defined as 0.5*x*(1+erf(x/sqrt(2))).
        shapes:
          - [1, 128]
          - [4, 2048]
          - [32, 4096]
        golden_status: untested
        generative_status: pending

  - name: leaky_relu
    tier: composed
    asc2_api: "asc2.where(x >= 0, x, alpha * x)"
    note: "Tests conditional logic with asc2.where"
    cells:
      - dtype: float16
        prompt: >-
          Help me develop a leaky_relu operator that supports float16 data type
          with alpha=0.01. The shape is mainly [1,128], [4,2048], [32,4096].
        shapes:
          - [1, 128]
          - [4, 2048]
          - [32, 4096]
        golden_status: golden_only
        golden: golden/kernels/leaky_relu_f16.py
        golden_evidence: evidence/leaky_relu-f16-golden.json
        generative_status: untested

  # --- Tier 3: Advanced ---

  - name: softmax
    tier: advanced
    asc2_api: "asc2.softmax(x)"
    note: "Single builtin for tiles that fit; manual decomposition for long rows"
    cells:
      - dtype: float16
        prompt: >-
          Help me develop a softmax operator that supports float16 data type.
          The shape is mainly [32, 4096]. Apply softmax along the last axis
          so each row sums to 1.
        shapes:
          - [32, 4096]
        golden_status: confirmed
        golden: golden/kernels/softmax_f16.py
        golden_evidence: evidence/softmax-f16-golden.json
        generative_status: pending

  - name: matmul
    tier: advanced
    asc2_api: "asc2.matmul(a, b)"
    note: "Requires K-tiling with accumulator for non-trivial sizes"
    cells:
      - dtype: float16
        prompt: >-
          Help me develop a matrix multiplication operator that supports float16
          data type. The shapes are mainly M=128, K=256, N=128. Use asc2.matmul
          for the core computation.
        shapes:
          - [128, 256]
          - [256, 128]
        golden_status: untested
        generative_status: pending
