name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tier:
        description: "CI tier to run"
        type: choice
        options: [pr, merge, nightly]
        default: nightly

permissions:
  contents: write
  packages: write

env:
  PYASC_SIM_IMAGE: ghcr.io/${{ github.repository_owner }}/pyasc-sim:py3.11
  PYTHON: python3.10

jobs:
  # ==========================================================================
  # PR gate: L1 unit tests + JIT verification (no Docker, no CANN)
  # ==========================================================================
  pr-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run PR gate
        run: bash tests/ci-gate.sh --tier pr

  # ==========================================================================
  # Build Docker image (only when Dockerfile changes or on nightly/dispatch)
  # ==========================================================================
  build-image:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push pyasc-sim image
        uses: docker/build-push-action@v6
        with:
          context: docker/
          file: docker/Dockerfile
          push: true
          tags: ${{ env.PYASC_SIM_IMAGE }}
          cache-from: type=registry,ref=${{ env.PYASC_SIM_IMAGE }}
          cache-to: type=inline

  # ==========================================================================
  # Merge gate: PR gate + simulator verification of golden kernels in Docker
  # ==========================================================================
  merge-gate:
    runs-on: ubuntu-latest
    needs: [pr-gate, build-image]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pyasc-sim image
        run: docker pull ${{ env.PYASC_SIM_IMAGE }}

      - name: Simulator verification of golden kernels
        run: |
          for kernel in golden/kernels/*.py; do
            [ -f "$kernel" ] || continue
            base=$(basename "$kernel")
            echo "--- Verifying: $base ---"
            docker run --rm \
              -v "$(pwd)":/workspace \
              -w /workspace \
              ${{ env.PYASC_SIM_IMAGE }} \
              python3.11 tests/tools/run_and_verify.py "$kernel" --mode simulator \
              && echo "[PASS] $base" \
              || echo "[FAIL] $base"
          done

  # ==========================================================================
  # Nightly gate: merge gate + generative evidence collection
  # ==========================================================================
  nightly-gate:
    runs-on: ubuntu-latest
    needs: [merge-gate]
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'nightly')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pyasc-sim image
        run: docker pull ${{ env.PYASC_SIM_IMAGE }}

      - name: Install opencode
        run: |
          npm install -g opencode-ai @ai-sdk/openai-compatible

      - name: Configure opencode provider
        run: |
          mkdir -p ~/.config/opencode
          echo '${{ secrets.OPENCODE_CONFIG }}' > ~/.config/opencode/opencode.json

      - name: Run generative evidence collection (multi-attempt per tier)
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          PYASC_SIM_IMAGE: ${{ env.PYASC_SIM_IMAGE }}
        run: |
          mkdir -p generative-archive
          declare -a OPS=("abs:float16" "add:float16" "reduce_sum:float32" "reduce_sum:float16" "gelu:float16" "gelu:float32" "leaky_relu:float16" "softmax:float16" "matmul:float16")
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ATTEMPTS=2
          for entry in "${OPS[@]}"; do
            op="${entry%%:*}"
            dtype="${entry##*:}"
            best_exit=1
            for attempt in $(seq 1 $ATTEMPTS); do
              echo "=== Generative evidence: $op / $dtype (attempt $attempt/$ATTEMPTS) ==="
              python3.10 tests/tools/collect_generative_evidence.py \
                --op "$op" --dtype "$dtype" \
                --runtime --timeout 420 \
                --archive-dir generative-archive \
                --ci-run-url "$CI_RUN_URL" \
                --notes "Nightly CI run (attempt $attempt/$ATTEMPTS)" \
                && best_exit=0 && break \
                || echo "  Attempt $attempt failed (exit $?)"
              echo ""
            done
            if [ $best_exit -ne 0 ]; then
              echo "  All $ATTEMPTS attempts failed for $op/$dtype"
            fi
          done

      - name: Commit evidence to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add evidence/*.json
          if git diff --cached --quiet; then
            echo "No new evidence to commit."
          else
            git commit -m "chore: update generative evidence from nightly run

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push
          fi

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence
          path: evidence/
          if-no-files-found: ignore

      - name: Upload generated kernel archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generative-archive
          path: generative-archive/
          if-no-files-found: ignore
