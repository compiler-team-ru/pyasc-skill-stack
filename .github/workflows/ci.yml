name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tier:
        description: "CI tier to run"
        type: choice
        options: [pr, merge, nightly]
        default: nightly

permissions:
  contents: write
  packages: read

env:
  PYASC_SIM_IMAGE: ghcr.io/${{ github.repository_owner }}/pyasc-sim:py3.11
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ==========================================================================
  # PR gate: L1 unit tests + static checks (no Docker, no CANN)
  # ==========================================================================
  pr-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run PR gate
        run: bash tests/ci-gate.sh --tier pr

  # ==========================================================================
  # Merge gate: PR gate + simulator verification of golden kernels in Docker
  #
  # The Docker image is pre-built locally (contains a native C++ extension)
  # and pushed to ghcr.io.  CI only pulls it.
  # ==========================================================================
  merge-gate:
    runs-on: ubuntu-latest
    needs: [pr-gate]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pyasc-sim image
        run: docker pull ${{ env.PYASC_SIM_IMAGE }}

      - name: Simulator verification of golden kernels
        run: |
          FAILED=0
          # All goldens verified on C310 (Ascend950PR_9599); 910B1 is no
          # longer a CI target. Heavy CANN simulator runs (esp. matmul,
          # gelu_f32) need a large nofile ulimit and a generous timeout.
          PLATFORM=Ascend950PR_9599
          TIMEOUT=1500
          for kernel in golden/kernels/*.py; do
            [ -f "$kernel" ] || continue
            base=$(basename "$kernel")
            echo "--- Verifying: $base (platform=$PLATFORM) ---"
            if docker run --rm \
              --ulimit nofile=65536:65536 \
              -v "$(pwd)":/workspace:ro \
              -w /workspace \
              ${{ env.PYASC_SIM_IMAGE }} \
              python3.11 tests/tools/run_and_verify.py "$kernel" \
                --mode simulator --platform "$PLATFORM" --timeout "$TIMEOUT"; then
              echo "[PASS] $base"
            else
              echo "[FAIL] $base"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: $FAILED golden kernel(s) failed simulator verification"
            exit 1
          fi
          echo "All golden kernels passed."

  # ==========================================================================
  # Nightly gate: merge gate + generative evidence collection via opencode
  # ==========================================================================
  nightly-gate:
    runs-on: ubuntu-latest
    needs: [merge-gate]
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'nightly')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pyasc-sim image
        run: docker pull ${{ env.PYASC_SIM_IMAGE }}

      - name: Install opencode
        run: npm install -g opencode-ai @ai-sdk/openai-compatible

      - name: Configure opencode provider
        run: |
          mkdir -p ~/.config/opencode
          echo '${{ secrets.OPENCODE_CONFIG }}' > ~/.config/opencode/opencode.json

      - name: Run generative evidence collection
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          PYASC_SIM_IMAGE: ${{ env.PYASC_SIM_IMAGE }}
        run: |
          mkdir -p generative-archive
          declare -a OPS=(
            "abs:float16"
            "abs:float32"
            "add:float16"
            "reduce_sum:float32"
            "reduce_sum:float16"
            "gelu:float16"
            "gelu:float32"
            "leaky_relu:float16"
            "softmax:float16"
            "matmul:float16"
            "rms_norm:float16"
            "rms_norm:float32"
          )
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ATTEMPTS=3
          PASS=0
          TOTAL=${#OPS[@]}
          for entry in "${OPS[@]}"; do
            op="${entry%%:*}"
            dtype="${entry##*:}"
            best_exit=1
            # Uniform 1500s docker timeout (matches merge-gate post-C310 migration).
            # Pre-migration nightly used 300s/600s on Ascend910B1, but the C310
            # camodel is markedly slower (~80s wall per launch in our probes), and
            # opencode-generated kernels with shapes [32,4096] easily exceeded the
            # smaller budgets — see docs/perf-methodology/ticks-calculation.md and
            # the 2026-05-07 nightly post-mortem.
            DOCKER_TO=1500
            for attempt in $(seq 1 $ATTEMPTS); do
              echo "=== Generative evidence: $op / $dtype (attempt $attempt/$ATTEMPTS) ==="
              python3.10 tests/tools/collect_generative_evidence.py \
                --op "$op" --dtype "$dtype" \
                --runtime --timeout 420 \
                --docker-timeout "$DOCKER_TO" \
                --archive-dir generative-archive \
                --ci-run-url "$CI_RUN_URL" \
                --notes "Nightly CI run (attempt $attempt/$ATTEMPTS)" \
                && best_exit=0 && break \
                || echo "  Attempt $attempt failed (exit $?)"
              echo ""
            done
            if [ $best_exit -ne 0 ]; then
              echo "  Default prompt failed; trying guided variant as fallback..."
              python3.10 tests/tools/collect_generative_evidence.py \
                --op "$op" --dtype "$dtype" \
                --runtime --timeout 420 \
                --docker-timeout "$DOCKER_TO" \
                --archive-dir generative-archive \
                --ci-run-url "$CI_RUN_URL" \
                --prompt-variant guided \
                --notes "Nightly CI run (guided fallback)" \
                && best_exit=0 \
                || echo "  Guided variant also failed"
            fi
            if [ $best_exit -eq 0 ]; then
              PASS=$((PASS + 1))
            else
              echo "  All attempts failed for $op/$dtype"
            fi
          done
          echo ""
          echo "=== Generative evidence summary: $PASS/$TOTAL passed ==="
          MIN_PASS=$(( (TOTAL + 1) / 2 ))
          if [ "$PASS" -lt "$MIN_PASS" ]; then
            echo "::error::Only $PASS/$TOTAL passed (minimum $MIN_PASS required, 50%) — failing nightly gate"
            exit 1
          fi

      - name: Summarize evidence
        if: always()
        run: |
          python3.10 - <<'PYEOF'
          import json, glob, sys
          files = sorted(glob.glob("evidence/*-generative.json"))
          if not files:
              print("No generative evidence files found.")
              sys.exit(0)
          rt_pass = rt_skip = rt_fail = 0
          for f in files:
              with open(f) as fh:
                  d = json.load(fh)
              status = d.get("verification", {}).get("status", "unknown")
              score = d.get("score", {}).get("value", 0)
              if status == "pass": rt_pass += 1
              elif status == "skip": rt_skip += 1
              else: rt_fail += 1
              print(f"  {f}: runtime={status}  score={score}")
          total = len(files)
          print(f"\n  Runtime pass: {rt_pass}/{total} | Skip: {rt_skip}/{total} | Fail: {rt_fail}/{total}")
          PYEOF

      - name: Commit evidence and sync capabilities
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          pip install pyyaml -q
          python3.10 tests/tools/sync_capabilities.py
          git add evidence/*.json capabilities.yaml
          if git diff --cached --quiet; then
            echo "No new evidence to commit."
          else
            git commit -m "chore: update generative evidence and capabilities from nightly run

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push
          fi

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence
          path: evidence/
          if-no-files-found: ignore

      - name: Upload generated kernel archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generative-archive
          path: generative-archive/
          if-no-files-found: ignore
