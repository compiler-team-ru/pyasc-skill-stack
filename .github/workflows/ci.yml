name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      tier:
        description: "CI tier to run"
        type: choice
        options: [pr, merge, nightly]
        default: nightly

permissions:
  contents: write
  packages: read

env:
  # NB: this image tag is built from docker/Dockerfile with
  # PYASC_GIT_URL=https://gitcode.com/compiler-team/pyasc.git and
  # PYASC_GIT_REV pinned to the SHA recorded in
  # docs/skill-value-q1-findings.md "Setup" section. Bumping the host-side
  # pyasc-v2-eval pin therefore requires rebuilding+repushing this image
  # so docker fallback runs stay consistent with the host-runtime baseline.
  PYASC_SIM_IMAGE: ghcr.io/${{ github.repository_owner }}/pyasc-sim:py3.11
  # docker_full perf image: pyasc-sim + vendored ops-math/ops-nn +
  # pyasc-v2-eval + dav_3510/Ascend950PR_9599 sims. Built manually on the
  # host (docker/build-perf-image.sh) and pushed; CI only pulls it. The
  # nightly perf-gate runs the full perf-vs-AscendC harness inside it.
  PYASC_PERF_IMAGE: ghcr.io/${{ github.repository_owner }}/pyasc-sim-perf:py3.11
  # Hard pin so the harness aborts if a runner accidentally imports a
  # pyasc tree other than pyasc-v2-eval (e.g. the user's dev fork).
  PYASC_EVAL_ROOT: /home/aloschilov/workspace/pyasc-v2-eval
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ==========================================================================
  # PR gate: L1 unit tests + static checks (no Docker, no CANN)
  # ==========================================================================
  pr-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run PR gate
        run: bash tests/ci-gate.sh --tier pr

  # ==========================================================================
  # Merge gate: PR gate + simulator verification of golden kernels in Docker
  #
  # The Docker image is pre-built locally (contains a native C++ extension)
  # and pushed to ghcr.io.  CI only pulls it.
  # ==========================================================================
  merge-gate:
    runs-on: ubuntu-latest
    needs: [pr-gate]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pyasc-sim image
        run: docker pull ${{ env.PYASC_SIM_IMAGE }}

      - name: Simulator verification of golden kernels
        run: |
          FAILED=0
          # All goldens verified on C310 (Ascend950PR_9599); 910B1 is no
          # longer a CI target. Heavy CANN simulator runs (esp. matmul,
          # gelu_f32) need a large nofile ulimit and a generous timeout.
          PLATFORM=Ascend950PR_9599
          TIMEOUT=1500
          for kernel in golden/kernels/*.py; do
            [ -f "$kernel" ] || continue
            base=$(basename "$kernel")
            echo "--- Verifying: $base (platform=$PLATFORM) ---"
            if docker run --rm \
              --ulimit nofile=65536:65536 \
              -v "$(pwd)":/workspace:ro \
              -w /workspace \
              ${{ env.PYASC_SIM_IMAGE }} \
              python3.11 tests/tools/run_and_verify.py "$kernel" \
                --mode simulator --platform "$PLATFORM" --timeout "$TIMEOUT"; then
              echo "[PASS] $base"
            else
              echo "[FAIL] $base"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: $FAILED golden kernel(s) failed simulator verification"
            exit 1
          fi
          echo "All golden kernels passed."

  # ==========================================================================
  # Perf gate (REPORT-ONLY): measure perf-vs-AscendC for every demo cell in
  # the docker_full perf image and publish the result to the dashboard.
  #
  # For each cell the harness builds the canonical ops-math/ops-nn AscendC
  # reference and the generated pyasc kernel on the same Ascend950PR_9599
  # camodel, then computes ratio = ref_ticks / gen_ticks. This is a NIGHTLY,
  # NON-BLOCKING job (continue-on-error): the 0.70 gate is reported, never
  # enforced, so documented honest misses (apply_adam ~0.46, batch_norm_v3
  # ~0.10) stay green. The committed evidence/perf-summary.json (produced
  # here, committed by skills-value-report) is what generate_dashboard.py
  # renders in the perf panel.
  #
  # The same job also runs the --cce-simd-vf-fusion off-vs-on A/B
  # (demo_vf_fusion.py) on each generated kernel and publishes
  # evidence/vf-fusion-summary.json for the dashboard's "Compiler SIMD fusion"
  # panel (verifies the "pyasc2 uses no micro-api; the compiler does fusion"
  # positioning). Also report-only.
  # ==========================================================================
  perf-gate:
    runs-on: ubuntu-latest
    needs: [merge-gate]
    continue-on-error: true
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'nightly')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pyasc-sim-perf image
        run: docker pull ${{ env.PYASC_PERF_IMAGE }}

      - name: Measure perf-vs-AscendC for all cells
        run: |
          # OPS_MATH_HOME / OPS_NN_HOME / PYASC_EVAL_ROOT are baked into the
          # perf image. Mount the checkout rw so evidence lands back on the
          # runner; the build cache (evidence/perf/_build_cache) is ephemeral.
          docker run --rm \
            --ulimit nofile=65536:65536 \
            -v "$(pwd)":/workspace -w /workspace \
            ${{ env.PYASC_PERF_IMAGE }} \
            bash -lc 'source "$ASCEND_HOME_PATH/set_env.sh" 2>/dev/null; \
              python3.11 tests/tools/demo_vector_ops.py --all --runs 3' \
            || echo "::warning::perf harness reported a non-zero exit (gate misses are expected and non-blocking)"

      - name: A/B compiler SIMD fusion (--cce-simd-vf-fusion off vs on)
        if: always()
        run: |
          # Compiles each generated kernel with the bisheng vector-fusion flag
          # off vs on on the same camodel (the "pyasc2 uses no micro-api; the
          # compiler does fusion" verification). Report-only like the perf gate;
          # ref builds are reused from the demo_vector_ops run's _build_cache.
          docker run --rm \
            --ulimit nofile=65536:65536 \
            -v "$(pwd)":/workspace -w /workspace \
            ${{ env.PYASC_PERF_IMAGE }} \
            bash -lc 'source "$ASCEND_HOME_PATH/set_env.sh" 2>/dev/null; \
              python3.11 tests/tools/demo_vf_fusion.py --all --runs 3' \
            || echo "::warning::vf-fusion A/B reported a non-zero exit (non-blocking)"

      - name: Aggregate perf + vf-fusion summaries
        if: always()
        run: |
          python3.10 tests/tools/perf/aggregate_perf.py
          python3.10 tests/tools/perf/aggregate_vf_fusion.py

      - name: Upload perf evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-perf
          path: |
            evidence/perf-vs-ascendc/*.json
            evidence/perf-summary.json
            evidence/vf-fusion/*.json
            evidence/vf-fusion-summary.json
          if-no-files-found: ignore

  # ==========================================================================
  # Nightly gate: OpenCode skills intervention on the cloud profile.
  #
  # Phase 0 promotes the protocol axis to a first-class matrix dimension.
  # Each capability cell now runs FOUR legs against the cloud-default
  # profile: P2 (skills off + minimal prompt), P3 (skills off + guided
  # prompt), P4 (skills off + baseline AGENTS.md + guided prompt), and
  # P6 (skills on + guided prompt). All four use the same OpenCode
  # harness, the same resolved model, the same timeout, the same max
  # attempts, and the same evaluator; only the protocol-knob differs.
  # See docs/evaluation-methodology.md §"Protocol-axis CI mapping
  # (Phase 0)" for the full contract.
  #
  # Only P6 enforces the minimum-pass threshold; P2/P3/P4 are explicitly
  # allowed to underperform (they are the upper-bound-of-no-skills
  # baselines we are measuring against).
  #
  # The job no longer commits evidence or syncs capabilities — that runs
  # once in `skills-value-report` after every matrix leg + the local
  # stability matrix have finished. This avoids commit races and lets
  # the aggregator see a consistent evidence directory.
  # ==========================================================================
  nightly-gate:
    runs-on: ubuntu-latest
    needs: [merge-gate]
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'nightly')
    strategy:
      fail-fast: false
      matrix:
        protocol_id: ["P2", "P3", "P4", "P6"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pyasc-sim image
        run: docker pull ${{ env.PYASC_SIM_IMAGE }}

      - name: Install opencode
        run: npm install -g opencode-ai @ai-sdk/openai-compatible

      - name: Configure opencode provider
        run: |
          mkdir -p ~/.config/opencode
          echo '${{ secrets.OPENCODE_CONFIG }}' > ~/.config/opencode/opencode.json

      # Lowercase the protocol id once so subsequent steps (artifact
      # glob, summary) can reference it without re-shell-quoting.
      # `if: always()` on later steps must still see it, so we set it
      # before the heavy "Run" step that might fail mid-way.
      - name: Resolve protocol id (lowercase)
        env:
          PROTOCOL_ID: ${{ matrix.protocol_id }}
        run: |
          PROTOCOL_ID_LOWER=$(echo "$PROTOCOL_ID" | tr '[:upper:]' '[:lower:]')
          echo "PROTOCOL_ID_LOWER=$PROTOCOL_ID_LOWER" >> "$GITHUB_ENV"

      - name: Run OpenCode skills-intervention leg (protocol_id=${{ matrix.protocol_id }})
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          PYASC_SIM_IMAGE: ${{ env.PYASC_SIM_IMAGE }}
          PROTOCOL_ID: ${{ matrix.protocol_id }}
        run: |
          mkdir -p generative-archive
          declare -a OPS=(
            "abs:float16"
            "abs:float32"
            "add:float16"
            "reduce_sum:float32"
            "reduce_sum:float16"
            "gelu:float16"
            "gelu:float32"
            "leaky_relu:float16"
            "softmax:float16"
            "matmul:float16"
            "rms_norm:float16"
            "rms_norm:float32"
          )
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Uniform 1500s docker timeout (matches merge-gate post-C310 migration).
          # Pre-migration nightly used 300s/600s on Ascend910B1, but the C310
          # camodel is markedly slower (~80s wall per launch in our probes), and
          # opencode-generated kernels with shapes [32,4096] easily exceeded the
          # smaller budgets — see docs/perf-methodology/ticks-calculation.md and
          # the 2026-05-07 nightly post-mortem.
          DOCKER_TO=1500
          PASS=0
          TOTAL=${#OPS[@]}
          for entry in "${OPS[@]}"; do
            op="${entry%%:*}"
            dtype="${entry##*:}"
            echo "=== Generative evidence: $op / $dtype (protocol_id=$PROTOCOL_ID) ==="
            if python3.10 tests/tools/collect_generative_evidence.py \
                --op "$op" --dtype "$dtype" \
                --runtime --runtime-backend auto --timeout 420 \
                --docker-timeout "$DOCKER_TO" \
                --archive-dir generative-archive \
                --ci-run-url "$CI_RUN_URL" \
                --model-profile cloud-default \
                --protocol-id "$PROTOCOL_ID" \
                --max-attempts 3 \
                --notes "Nightly CI run (protocol=$PROTOCOL_ID)"; then
              PASS=$((PASS + 1))
            else
              echo "  All attempts failed for $op/$dtype"
            fi
            echo ""
          done
          echo ""
          echo "=== OpenCode skills-intervention leg summary (protocol=$PROTOCOL_ID): $PASS/$TOTAL passed ==="
          # Only the P6 leg (skills on + guided) enforces the >=50% pass
          # threshold. P2/P3/P4 are the OpenCode-without-skills upper
          # bounds that the skills-on result is compared against, and
          # are explicitly allowed to underperform.
          if [ "$PROTOCOL_ID" = "P6" ]; then
            MIN_PASS=$(( (TOTAL + 1) / 2 ))
            if [ "$PASS" -lt "$MIN_PASS" ]; then
              echo "::error::Only $PASS/$TOTAL passed in P6 leg (minimum $MIN_PASS required, 50%) — failing nightly gate"
              exit 1
            fi
          fi

      - name: Summarize evidence
        if: always()
        env:
          PROTOCOL_ID: ${{ matrix.protocol_id }}
        run: |
          python3.10 - <<'PYEOF'
          import json, glob, os
          pid = os.environ.get("PROTOCOL_ID", "P6").lower()
          files = sorted(glob.glob(
              f"evidence/*-generative-cloud-default-{pid}.json"))
          if not files:
              print(f"No generative evidence files found for protocol_id={pid}.")
              raise SystemExit(0)
          rt_pass = rt_skip = rt_fail = 0
          for f in files:
              with open(f) as fh:
                  d = json.load(fh)
              status = d.get("verification", {}).get("status", "unknown")
              score = d.get("score", {}).get("value", 0)
              tokens = d.get("tokens", {}).get("total", 0)
              elapsed = d.get("elapsed_total_s", 0)
              if status == "pass": rt_pass += 1
              elif status == "skip": rt_skip += 1
              else: rt_fail += 1
              print(f"  {f}: runtime={status}  score={score}  "
                    f"tokens={tokens}  elapsed={elapsed}s")
          total = len(files)
          print(f"\n  Runtime pass: {rt_pass}/{total} | Skip: {rt_skip}/{total} | Fail: {rt_fail}/{total}")
          PYEOF

      # Only upload the evidence files this leg actually owns. Uploading
      # the whole `evidence/` directory used to bundle stale checkout
      # copies of every other leg's filename into this artifact; the
      # merge step in `skills-value-report` would then `cp -f` artifacts
      # in non-deterministic order and the stale copies would silently
      # overwrite freshly-written per-leg evidence. The glob below
      # restricts each artifact to exactly the per-protocol filenames
      # this leg writes
      # (`*-generative-cloud-default-<protocol_id_lower>.json`).
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-cloud-${{ matrix.protocol_id }}
          path: evidence/*-generative-cloud-default-${{ env.PROTOCOL_ID_LOWER }}.json
          if-no-files-found: ignore

      - name: Upload generated kernel archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generative-archive-cloud-${{ matrix.protocol_id }}
          path: generative-archive/
          if-no-files-found: ignore

  # ==========================================================================
  # Local-stability gate: the same OpenCode skills intervention as the
  # nightly cloud leg, but against small local models served from a
  # sidecar Ollama instance.
  #
  # This measures the "stability" axis of the OpenCode skills
  # intervention: does mounting the pyasc skills let smaller models
  # produce viable kernels they cannot produce under raw OpenCode? Both
  # legs hold OpenCode harness, prompt, timeout, max attempts, and
  # evaluator constant — only the skill modules differ. Failing on both
  # legs is a model/harness capability boundary on this hardware, not
  # evidence the skills are useless (see
  # docs/evaluation-methodology.md "Local-model interpretation").
  #
  # Local inference on GitHub-hosted runners is markedly slower than the
  # cloud profile, so this job is marked continue-on-error and is not
  # part of the merge-blocking gate. The companion
  # `skills-value-report` job ingests whatever evidence this job
  # produces.
  # ==========================================================================
  local-stability-gate:
    runs-on: ubuntu-latest
    needs: [merge-gate]
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'nightly')
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        profile: [local-qwen-coder-7b, local-llama-3.1-8b]
        # See comment in nightly-gate for why these are quoted.
        skills_mode: ["on", "off"]
    env:
      OLLAMA_BASE_URL: "http://127.0.0.1:11434/v1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pyasc-sim image
        run: docker pull ${{ env.PYASC_SIM_IMAGE }}

      - name: Install opencode
        run: npm install -g opencode-ai @ai-sdk/openai-compatible

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          # Wait for the daemon to be ready.
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:11434/api/tags > /dev/null; then
              echo "Ollama ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Pull model
        env:
          PROFILE: ${{ matrix.profile }}
        run: |
          case "$PROFILE" in
            local-qwen-coder-7b) ollama pull qwen2.5-coder:7b ;;
            local-llama-3.1-8b)  ollama pull llama3.1:8b ;;
            *) echo "::error::unknown profile $PROFILE"; exit 1 ;;
          esac

      - name: Run OpenCode skills-intervention leg (profile=${{ matrix.profile }}, skills_mode=${{ matrix.skills_mode }})
        env:
          NODE_TLS_REJECT_UNAUTHORIZED: "0"
          PYASC_SIM_IMAGE: ${{ env.PYASC_SIM_IMAGE }}
          PROFILE: ${{ matrix.profile }}
          SKILLS_MODE: ${{ matrix.skills_mode }}
        run: |
          mkdir -p generative-archive
          declare -a OPS=(
            "abs:float16"
            "abs:float32"
            "add:float16"
            "reduce_sum:float32"
            "reduce_sum:float16"
            "gelu:float16"
            "gelu:float32"
            "leaky_relu:float16"
            "softmax:float16"
            "matmul:float16"
            "rms_norm:float16"
            "rms_norm:float32"
          )
          CI_RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # Local inference is slow on GitHub-hosted runners; give each
          # attempt a longer per-prompt timeout but keep --max-attempts low
          # so the matrix leg finishes in a reasonable wall-clock budget.
          DOCKER_TO=1500
          PASS=0
          TOTAL=${#OPS[@]}
          for entry in "${OPS[@]}"; do
            op="${entry%%:*}"
            dtype="${entry##*:}"
            echo "=== Generative evidence: $op / $dtype ($PROFILE, skills_mode=$SKILLS_MODE) ==="
            if python3.10 tests/tools/collect_generative_evidence.py \
                --op "$op" --dtype "$dtype" \
                --runtime --runtime-backend auto --timeout 1200 \
                --docker-timeout "$DOCKER_TO" \
                --archive-dir generative-archive \
                --ci-run-url "$CI_RUN_URL" \
                --model-profile "$PROFILE" \
                --skills-mode "$SKILLS_MODE" \
                --max-attempts 2 \
                --fallback-variant guided \
                --notes "Local stability run ($PROFILE, skills=$SKILLS_MODE)"; then
              PASS=$((PASS + 1))
            else
              echo "  All attempts failed for $op/$dtype"
            fi
            echo ""
          done
          echo "=== Local stability summary ($PROFILE/$SKILLS_MODE): $PASS/$TOTAL passed ==="

      # Only upload the evidence files this leg actually owns. See the
      # equivalent note above `nightly-gate`'s upload step for the full
      # rationale; the short version is that uploading the whole
      # `evidence/` directory bundles stale checkout copies of every
      # other leg's filename into this artifact and lets them race the
      # merge step in `skills-value-report`.
      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-${{ matrix.profile }}-${{ matrix.skills_mode }}
          path: evidence/*-generative-${{ matrix.profile }}-${{ matrix.skills_mode }}.json
          if-no-files-found: ignore

      - name: Upload generated kernel archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generative-archive-${{ matrix.profile }}-${{ matrix.skills_mode }}
          path: generative-archive/
          if-no-files-found: ignore

  # ==========================================================================
  # OpenCode skills-intervention report: merge evidence from every
  # matrix leg, run the comparison aggregator (which classifies each
  # off-leg's comparability and computes the validity-aware clean
  # aggregates documented in docs/evaluation-methodology.md), sync
  # capabilities, and commit.
  #
  # This is the single writer to capabilities.yaml + the evidence/
  # directory on `main`. It runs `if: always()` so that a single failing
  # matrix leg in nightly-gate or local-stability-gate doesn't suppress
  # the report.
  # ==========================================================================
  skills-value-report:
    runs-on: ubuntu-latest
    needs: [nightly-gate, local-stability-gate, perf-gate]
    if: >-
      always() &&
      (github.event_name == 'schedule' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.tier == 'nightly'))
    steps:
      - uses: actions/checkout@v4
        with:
          # We commit back to main, so fetch full history.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download all evidence artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: evidence-*
          merge-multiple: false

      # Detect whether the most recent nightly was partial — at least
      # one matrix leg of nightly-gate or local-stability-gate
      # cancelled or failed before its evidence files were uploaded.
      # We use this signal to (a) annotate the produced summary with
      # `partial_run: true` so the dashboard can render a warning band
      # and (b) gate the auto-commit so we never silently land a
      # mixture of fresh + stale per-cell evidence on `main`.
      - name: Detect partial run
        id: partial-run
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          NIGHTLY_RESULT: ${{ needs.nightly-gate.result }}
          LOCAL_RESULT: ${{ needs.local-stability-gate.result }}
        run: |
          mkdir -p artifacts
          gh api "repos/$REPO/actions/runs/$RUN_ID/jobs?per_page=100" \
            > artifacts/jobs.json
          python3.10 tests/tools/detect_partial_run.py \
            --jobs-file artifacts/jobs.json \
            --output artifacts/legs-status.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Merge evidence into evidence/
        run: |
          # Delegated to a tested script so the same logic runs in CI
          # and in the local smoke harness (see
          # tests/tools/test_skills_value_pipeline.py).
          bash tests/tools/merge_evidence_artifacts.sh artifacts evidence
          ls -1 evidence/

      - name: Re-aggregate perf + vf-fusion summaries
        # Recompute evidence/perf-summary.json and evidence/vf-fusion-summary.json
        # from the merged records so the dashboard perf + SIMD-fusion panels
        # reflect this night's run.
        run: |
          python3.10 tests/tools/perf/aggregate_perf.py
          python3.10 tests/tools/perf/aggregate_vf_fusion.py

      - name: Snapshot prior summary for --merge-history
        # Phase 10 noise-floor: capture the last main summary BEFORE we
        # overwrite it so the aggregator can append a `deltas_pp_history`
        # entry derived from it. This gives the dashboard a multi-night
        # noise-floor view without standing up new infrastructure.
        run: |
          if [ -f evidence/skills-value-summary.json ]; then
            cp evidence/skills-value-summary.json artifacts/prior-summary.json
          fi

      - name: Run OpenCode skills-intervention aggregator
        env:
          PARTIAL_RUN: ${{ steps.partial-run.outputs.partial_run }}
        run: |
          EXTRA=()
          if [ "$PARTIAL_RUN" = "true" ]; then
            EXTRA+=(--partial-run)
          fi
          if [ -f artifacts/prior-summary.json ]; then
            EXTRA+=(--merge-history artifacts/prior-summary.json)
            EXTRA+=(--history-archive-dir evidence/history)
          fi
          python3.10 tests/tools/compare_skills_value.py \
            "${EXTRA[@]}" \
            --legs-status-file artifacts/legs-status.json \
            --output evidence/skills-value-summary.json \
            --markdown skills-value-report.md
          {
            echo "## OpenCode skills intervention report"
            echo ""
            if [ "$PARTIAL_RUN" = "true" ]; then
              echo "> :warning: **Partial nightly** — at least one matrix leg was cancelled or failed before writing fresh evidence. Only \`evidence/skills-value-summary.json\` will be committed; per-cell evidence files retain their previous values to avoid mixing fresh + stale rows. See \`legs_status\` in the summary for details."
              echo ""
            fi
            cat skills-value-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sync capabilities.yaml
        if: steps.partial-run.outputs.partial_run != 'true'
        run: |
          python3.10 tests/tools/sync_capabilities.py

      - name: Commit evidence, summary, and capabilities
        env:
          PARTIAL_RUN: ${{ steps.partial-run.outputs.partial_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$PARTIAL_RUN" = "true" ]; then
            echo "::warning::Partial nightly detected (at least one matrix leg cancelled or failed). Committing skills-value-summary.json only; per-cell evidence files and capabilities.yaml are NOT updated to avoid mixing fresh and stale rows. See evidence/skills-value-summary.json -> legs_status for the leg-by-leg breakdown."
            git add evidence/skills-value-summary.json
            # Phase 10: history archive entries are immutable per-day
            # snapshots and safe to commit even on partial nightlies.
            if [ -d evidence/history ]; then
              git add evidence/history
            fi
          else
            git add evidence/*.json capabilities.yaml
            if [ -d evidence/history ]; then
              git add evidence/history
            fi
          fi
          # Perf + vf-fusion evidence is independent of the generative
          # partial-run guard (report-only perf-gate), so commit it in both
          # branches when present.
          if [ -d evidence/perf-vs-ascendc ]; then
            git add evidence/perf-vs-ascendc/*.json evidence/perf-summary.json 2>/dev/null || true
          fi
          if [ -d evidence/vf-fusion ]; then
            git add evidence/vf-fusion/*.json evidence/vf-fusion-summary.json 2>/dev/null || true
          fi
          if git diff --cached --quiet; then
            echo "No new evidence to commit."
          else
            git commit -m "chore: update generative evidence and OpenCode skills-intervention report from nightly run

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            git push
          fi

      - name: Upload merged evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evidence-merged
          path: evidence/
          if-no-files-found: ignore

      - name: Upload OpenCode skills-intervention markdown
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skills-value-report
          path: skills-value-report.md
          if-no-files-found: ignore
